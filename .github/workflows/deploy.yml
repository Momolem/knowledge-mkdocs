name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths: 
      - 'README.md'
      - 'overrides/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
env:
  VAULT_PW: ${{ secrets.VAULT_PW }}
  
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: Momolem/mkdocs-publisher-actions/.github/workflows/deploy.yml@feature/encryptcontent_env_support
    secrets:
      ENCRYPTCONTENT_PASSWORD: ${{ secrets.ENCRYPTCONTENT_PASSWORD }}
      GH_PAT: ${{ secrets.GITHUB_TOKEN }}
